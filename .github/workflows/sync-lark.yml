name: Sync Lark → Cloudflare KV

on:
  # 毎時0分に自動実行（バックアップ）
  schedule:
    - cron: "0 * * * *"
  # 手動実行ボタン（GitHub Actionsページから即時実行可能）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Lark sync
        run: |
          STATUS=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X GET "${{ secrets.SITE_URL }}/api/sync")
          cat /tmp/sync_response.json
          if [ "$STATUS" != "200" ]; then
            echo "Sync failed with status $STATUS"
            exit 1
          fi
          echo "Sync succeeded"
